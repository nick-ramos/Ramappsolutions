<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </linearGradient>
    <radialGradient id="glow1" cx="18%" cy="28%" r="55%">
      <stop offset="0%" stop-color="rgba(245,200,50,0.10)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="74%" r="50%">
      <stop offset="0%" stop-color="rgba(245,200,50,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="rgba(245,200,50,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Cube logo mark -->
  <g transform="translate(29.6,132.7) scale(2.3)">
    <polygon points="48,14 81.6,33 48,52 14.4,33" fill="#f5c832"/>
    <polygon points="14.4,33 48,52 48,88 14.4,69" fill="#c79f2e"/>
    <polygon points="81.6,33 48,52 48,88 81.6,69" fill="#a4801f"/>
  </g>

  <!-- Wordmark -->
  <text x="262" y="272" font-family="'Poppins',Inter,sans-serif" font-weight="800" font-size="66" letter-spacing="-1"><tspan fill="#f1f5f9">ramapp</tspan><tspan fill="#f5c832">.</tspan></text>
  <text x="264" y="312" font-family="'Poppins',Inter,sans-serif" font-weight="700" font-size="21" fill="#f5c832" letter-spacing="9">SOLUTIONS</text>

  <!-- Tagline -->
  <text x="70" y="424" font-family="'Poppins',Inter,sans-serif" font-weight="700" font-size="38" fill="#e2e8f0">AI tools &amp; automation systems</text>
  <text x="70" y="470" font-family="Inter,sans-serif" font-weight="400" font-size="22" fill="#8ea2c4">Custom-built for your workflow &#8212; built fast, owned by you.</text>

  <!-- Bottom accent line -->
  <rect x="70" y="512" width="180" height="3" rx="2" fill="#f5c832"/>

  <!-- Domain -->
  <text x="70" y="556" font-family="monospace" font-size="18" fill="rgba(245,200,50,0.55)">ramappsolutions.com</text>
