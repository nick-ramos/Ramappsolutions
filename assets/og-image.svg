<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </linearGradient>
    <linearGradient id="hexG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e0ff"/>
      <stop offset="100%" stop-color="#00c896"/>
    </linearGradient>
    <linearGradient id="textG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e0ff"/>
      <stop offset="100%" stop-color="#00ff9d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(0,224,255,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="rgba(0,224,255,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Hexagon logo mark -->
  <polygon points="140,180 210,220 210,300 140,340 70,300 70,220"
           stroke="url(#hexG)" stroke-width="4" fill="rgba(0,224,255,0.07)"/>
  <polygon points="140,200 195,230 195,290 140,320 85,290 85,230"
           fill="rgba(0,224,255,0.04)"/>
  <text x="114" y="282" font-family="Inter,sans-serif" font-weight="900" font-size="52" fill="url(#textG)">R</text>

  <!-- Wordmark -->
  <text x="240" y="278" font-family="Inter,sans-serif" font-weight="800" font-size="52" fill="#f1f5f9" letter-spacing="-1">Ramapp</text>
  <text x="242" y="316" font-family="Inter,sans-serif" font-weight="500" font-size="20" fill="#64748b" letter-spacing="8">SOLUTIONS</text>

  <!-- Tagline -->
  <text x="70" y="420" font-family="Inter,sans-serif" font-weight="700" font-size="36" fill="#e2e8f0">AI-Powered Consulting</text>
  <text x="70" y="468" font-family="Inter,sans-serif" font-weight="400" font-size="22" fill="#64748b">Custom AI tools &amp; automation systems — built fast, owned by you.</text>

  <!-- Bottom accent line -->
  <rect x="70" y="510" width="180" height="3" rx="2" fill="url(#textG)"/>

  <!-- Domain -->
  <text x="70" y="555" font-family="monospace" font-size="18" fill="rgba(0,224,255,0.5)">ramappsolutions.com</text>
</svg>
