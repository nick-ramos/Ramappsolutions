# =========================================================
#  Ramapp Solutions — Netlify Configuration
# =========================================================

# ---------- Build Settings ----------
[build]
  publish = "."

# ---------- Security & Performance Headers ----------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"

# ---------- Cache: Long-lived assets ----------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Brand marks keep stable filenames and change in place — always revalidate
# so logo/social-card updates show up immediately instead of being frozen.
[[headers]]
  for = "/assets/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/og-image.svg"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ---------- Clean URL Redirects ----------
[[redirects]]
  from   = "/work"
  to     = "/work.html"
  status = 200

[[redirects]]
  from   = "/services"
  to     = "/services.html"
  status = 200

[[redirects]]
  from   = "/pricing"
  to     = "/pricing.html"
  status = 200

[[redirects]]
  from   = "/process"
  to     = "/process.html"
  status = 200

[[redirects]]
  from   = "/contact"
  to     = "/contact.html"
  status = 200

[[redirects]]
  from   = "/blog"
  to     = "/blog.html"
  status = 200

# ---------- Custom 404 ----------
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
